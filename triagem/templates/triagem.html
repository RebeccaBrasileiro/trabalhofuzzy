<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Hospital Fuzzy - Manchester</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light container py-5">
    <div class="card shadow-sm p-4 mx-auto" style="max-width: 600px;">
        <h2 class="text-center mb-4">🏥 Triagem Hospitalar</h2>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Temperatura (°C):</label>
                <input type="number" step="0.1" name="temp" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Saturação de Oxigênio (%):</label>
                <input type="number" name="spo2" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Nível de Dor (0 a 10):</label>
                <input type="number" name="dor" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Avaliar Paciente</button>
        </form>

        {% if score %}
        <div class="alert alert-{{ cor }} mt-4 text-center border-0 {{ classe_css }}">
            <h4 class="alert-heading">Classificação: {{ status }}</h4>
            <hr>
            <p class="mb-0">Grau de Prioridade Calculado: <strong>{{ score }}%</strong></p>
        </div>
        {% endif %}
    </div>
</body>
</html>
